  :root {
    --bg: #fbf9f4;
    --surface: #ffffff;
    --ink: #1f1c17;
    --ink-soft: #6b6358;
    --line: #e7e1d6;
    --accent: #c8693a;
    --accent-soft: #fbe3d3;
    --hit: #ffd54a;
    --hit-active: #ff9e2c;
    --rule: #1f1c17;
    --shadow: 0 1px 2px rgba(40,32,20,.06), 0 4px 14px rgba(40,32,20,.05);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
    height: 100dvh; overflow: hidden;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0;
    transform: translateY(var(--vv-top, 0px));
    padding: max(env(safe-area-inset-top), 12px) 14px 10px;
    background: #0c0b0a;
    border-bottom: 1px solid #000; z-index: 45;
  }
  /* main content sits below the fixed header */
  main { margin-top: var(--header-h, 0px); }
  .titlerow { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .brandwrap { text-align: left; flex: 0 1 auto; min-width: 0; }
  .histwrap { flex: 0 0 auto; }
  .brand {
    font-family: 'SlavonTitle', 'PT Serif', Georgia, serif;
    font-weight: 400; font-size: 22px; line-height: 1; letter-spacing: .5px;
    color: #ffffff; white-space: nowrap; cursor: pointer; user-select: none;
  }
  .brand span { color: #ffffff; }
  .brand.counting { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 700; font-size: 20px; }
  .syncpill { font-size: 11px; color: #b8b0a4; background: #1c1a17; border: 1px solid #2a2723; border-radius: 20px; padding: 3px 9px; }
  .histbtn { width: 30px; height: 30px; border-radius: 9px; border: 1px solid #2a2723; background: #1c1a17; color: #cfc7ba; font-size: 15px; cursor: pointer; display: grid; place-items: center; }
  .cloudbtn svg { display: block; }
  .verinfo { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; margin-right: 2px; }
  .verinfo .ver { font-size: 9px; color: #8a8276; font-weight: 600; }
  .verinfo .savedat { font-size: 9px; color: #b8b0a4; font-variant-numeric: tabular-nums; }
  .cloudbtn .cloud-check { opacity: 0; }
  #cloud.off { color: #8a8276; background: #1c1a17; border-color: #2a2723; }
  #cloud.syncing { color: #ffd633; background: #2a2410; border-color: #5a4e16; }
  #cloud.syncing svg { animation: cloudspin 1.1s linear infinite; transform-origin: center; }
  #cloud.on { color: #0c0b0a; background: #4ad66d; border-color: #4ad66d; }
  #cloud.on .cloud-check { opacity: 1; }
  #cloud.err { color: #fff; background: #ff5247; border-color: #ff5247; }
  @keyframes cloudspin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .histbtn:active { transform: scale(.92); }
  .histbtn:disabled { opacity: .32; cursor: default; }

  .searchwrap { position: relative; display: flex; align-items: center; gap: 6px; }
  .searchbox {
    flex: 1 1 auto; min-width: 0; display: flex; align-items: center;
    background: #ffffff; border: 1.5px solid #000;
    border-radius: 14px; padding: 0 10px;
    transition: border-color .15s;
  }
  .searchbox:focus-within { border-color: var(--accent); }
  .searchbox svg { width: 18px; height: 18px; color: var(--ink-soft); flex: 0 0 auto; }
  #search { flex: 1; border: none; outline: none; background: transparent; font: inherit; font-size: 16px; padding: 11px 8px; color: var(--ink); min-width: 0; }
  /* hide the browser's built-in search clear (×) so only our button shows */
  #search::-webkit-search-cancel-button, #search::-webkit-search-decoration { -webkit-appearance: none; appearance: none; }
  .nav { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink-soft); white-space: nowrap; flex: 0 0 auto; }
  .nav button { border: none; background: var(--accent-soft); color: var(--accent); width: 28px; height: 30px; border-radius: 9px; font-size: 16px; font-weight: 700; cursor: pointer; display: grid; place-items: center; }
  .nav button:active { transform: scale(.92); }
  .nav .tally { min-width: 32px; text-align: center; font-variant-numeric: tabular-nums; font-size: 11px; }
  .clearbtn { border: none; background: transparent; color: var(--ink-soft); font-size: 20px; line-height: 1; cursor: pointer; padding: 4px 2px; flex: 0 0 auto; }

  main {
    flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
    padding: 14px 5px calc(96px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
  }

  .card-body { padding-bottom: 6px; }

  .card-more { font-size: 11px; color: var(--ink-soft); opacity: .7; padding: 6px 2px 0; text-align: center; font-style: italic; }
  .card.coloured .card-more { color: rgba(0,0,0,.5); }
  /* fade at the bottom when clamped to hint there's more */

  /* match position indicator rail on the right edge */

  /* resize mode */
  .card.resizing { box-shadow: var(--shadow), 0 0 0 2px var(--accent); cursor: default; }
  .resizebar {

  .erow { display: grid; grid-template-columns: 20px 1fr 36px 1fr; align-items: stretch; gap: 0; position: relative; }
  .secai {
    position: absolute; right: -2px; top: 50%; transform: translateY(-50%);
    display: none; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer;

    box-shadow: 0 2px 6px rgba(0,0,0,.18); z-index: 3;

  .erow.head .secai { display: inline-flex; }
  .secai:active { transform: translateY(-50%) scale(.9); }
  .secai svg { display: block; }
  .secai.busy { opacity: .6; pointer-events: none; }
  .erow.head { margin-top: 12px; }
  .erow.endmark { margin-bottom: 7px; }
  .erow.head:first-child { margin-top: 0; }
  .erow.head .ecell { font-weight: 700; }
  /* central rule per row (aligned to the speak column) */
  .erow::before { content: ""; position: absolute; top: 0; bottom: 0; left: calc(20px + (100% - 20px - 36px)/2 + (36px/2) - .75px); width: 1.5px; background: var(--rule); opacity: .85; }
  .sectoggle {
    grid-column: 1; align-self: start; margin-top: 6px; justify-self: center;
    width: 18px; height: 18px; border-radius: 5px; border: none;

  .ecell {
    border: none; outline: none; background: transparent; font: inherit; font-size: 16px;

  .ecell.l { text-align: right; grid-column: 2; }
  .ecell.r { text-align: left; grid-column: 4; }

    grid-column: 3; align-self: center; justify-self: center;

  @media (min-width: 620px) { main { padding-left: 18px; padding-right: 18px; } }

<script>
(function () {
  "use strict";


  const KEY = "numagalipov.v2";
  const SAVED_KEY = "numagalipov.savedAt";
  const VERSION = "v3.2";
  const LANG_L = "ru-RU";   // colonne gauche : russe
  const LANG_R = "fr-FR";   // colonne droite : français

  function fmtDate(ts) {
    if (!ts) return "—";
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, "0");
    return pad(d.getDate()) + "/" + pad(d.getMonth() + 1) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }
  function setSavedAt(ts) {
    try { localStorage.setItem(SAVED_KEY, String(ts)); } catch (e) {}
    const el = document.getElementById("savedat");
    if (el) el.textContent = fmtDate(ts);
    const v = document.getElementById("ver");
    if (v) v.textContent = VERSION;
  }

  const store = {
    load() { try { return JSON.parse(localStorage.getItem(KEY)) || null; } catch (e) { return null; } },
    save(n) { localStorage.setItem(KEY, JSON.stringify(n)); setSavedAt(Date.now()); cloud.schedulePush(); }
  };

  // ============ Google Drive sync (appDataFolder, newest-per-note wins) ============
  const cloud = (function () {
    const CLIENT_ID = "273483109418-krmabqug3fpt666kossnsittcvo74dvl.apps.googleusercontent.com";
    const SCOPE = "https://www.googleapis.com/auth/drive.appdata";
    const FILENAME = "numa-galipov.json";
    const BACKUP_FILENAME = "numa-galipov.backup.json";
    const TOKEN_KEY = "numagalipov.token";

    let tokenClient = null;
    let accessToken = null;
    let tokenExpiry = 0;
    let fileId = null;
    let gapiReady = false, gisReady = false;
    let pushTimer = null;
    let pulling = false;
    let started = false;

    function setStatus(cls, title) {
      const el = document.getElementById("cloud");
      if (!el) return;
      el.classList.remove("off","syncing","on","err");
      el.classList.add(cls);
      el.title = title || "Drive";
    }

    // wait until both google libs are present
    function waitForLibs(cb) {
      const t = setInterval(() => {
        if (window.gapi && window.google && google.accounts && google.accounts.oauth2) {
          clearInterval(t); cb();
        }
      }, 100);
      setTimeout(() => clearInterval(t), 15000);
    }

    function initGapi(cb) {
      gapi.load("client", async () => {
        await gapi.client.init({ discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
        gapiReady = true; cb();
      });
    }

    function initToken() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        callback: (resp) => {
          if (resp.error) { setStatus("err", "Erreur de connexion"); return; }
          accessToken = resp.access_token;
          tokenExpiry = Date.now() + (resp.expires_in ? resp.expires_in * 1000 : 3000000) - 60000;
          try { localStorage.setItem(TOKEN_KEY, JSON.stringify({ t: accessToken, e: tokenExpiry })); } catch (e) {}
          gapi.client.setToken({ access_token: accessToken });
          onAuthed();
        }
      });
      gisReady = true;
    }

    function haveValidToken() { return accessToken && Date.now() < tokenExpiry; }

    function ensureToken(interactive) {
      if (haveValidToken()) { gapi.client.setToken({ access_token: accessToken }); onAuthed(); return; }
      // try cached token first
      try {
        const cached = JSON.parse(localStorage.getItem(TOKEN_KEY) || "null");
        if (cached && cached.t && Date.now() < cached.e) {
          accessToken = cached.t; tokenExpiry = cached.e;
          gapi.client.setToken({ access_token: accessToken });
          onAuthed(); return;
        }
      } catch (e) {}
      if (tokenClient) {
        setStatus("syncing", "Connexion…");
        tokenClient.requestAccessToken({ prompt: interactive ? "consent" : "" });
      }
    }

    async function findFile() {
      const res = await gapi.client.drive.files.list({
        spaces: "appDataFolder",
        q: "name='" + FILENAME + "'",
        fields: "files(id,modifiedTime)",
        pageSize: 1
      });
      if (res.result.files && res.result.files.length) { fileId = res.result.files[0].id; return true; }
      return false;
    }

    async function downloadRemote() {
      if (!fileId) return null;
      const res = await gapi.client.drive.files.get({ fileId, alt: "media" });
      try { return JSON.parse(res.body); } catch (e) { return null; }
    }

    async function createFile(content) {
      const meta = { name: FILENAME, parents: ["appDataFolder"] };
      const boundary = "-------numa" + Date.now();
      const body =
        "--" + boundary + "\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n" +
        JSON.stringify(meta) + "\r\n" +
        "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" +
        JSON.stringify(content) + "\r\n--" + boundary + "--";
      const res = await gapi.client.request({
        path: "/upload/drive/v3/files",
        method: "POST",
        params: { uploadType: "multipart" },
        headers: { "Content-Type": "multipart/related; boundary=" + boundary },
        body
      });
      fileId = res.result.id;
    }

    async function updateFile(content) {
      if (!fileId) return createFile(content);
      await gapi.client.request({
        path: "/upload/drive/v3/files/" + fileId,
        method: "PATCH",
        params: { uploadType: "media" },
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(content)
      });
    }

    // Keep a single rolling backup of the LAST known cloud state, so a bad overwrite
    // can be recovered. Stored as a separate appDataFolder file.
    let backupId = null;
    async function writeBackup(content) {
      try {
        if (totalWords(content.notes) === 0) return; // never back up an empty state
        if (backupId === null) {
          const res = await gapi.client.drive.files.list({
            spaces: "appDataFolder", q: "name='" + BACKUP_FILENAME + "'",
            fields: "files(id)", pageSize: 1
          });
          backupId = (res.result.files && res.result.files.length) ? res.result.files[0].id : "";
        }
        const payload = JSON.stringify(content);
        if (!backupId) {
          const meta = { name: BACKUP_FILENAME, parents: ["appDataFolder"] };
          const boundary = "-------numabak" + Date.now();
          const body =
            "--" + boundary + "\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n" +
            JSON.stringify(meta) + "\r\n" +
            "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" +
            payload + "\r\n--" + boundary + "--";
          const res = await gapi.client.request({
            path: "/upload/drive/v3/files", method: "POST",
            params: { uploadType: "multipart" },
            headers: { "Content-Type": "multipart/related; boundary=" + boundary },
            body
          });
          backupId = res.result.id;
        } else {
          await gapi.client.request({
            path: "/upload/drive/v3/files/" + backupId, method: "PATCH",
            params: { uploadType: "media" },
            headers: { "Content-Type": "application/json" },
            body: payload
          });
        }
      } catch (e) { /* backup is best-effort, never block the main sync */ }
    }

    // merge two note arrays: newest per-note id wins; keep notes present on only one side
    function merge(local, remote) {
      const byId = {};
      (remote || []).forEach(n => { byId[n.id] = n; });
      (local || []).forEach(n => {
        const ex = byId[n.id];
        if (!ex || (n.t || 0) >= (ex.t || 0)) byId[n.id] = n;
      });
      return Object.values(byId).sort((a, b) => {
        if (a.col !== b.col) return (a.col||0) - (b.col||0);
        return (a.ord||0) - (b.ord||0);
      });
    }

    function totalWords(arr) {
      if (!Array.isArray(arr)) return 0;
      let n = 0;
      arr.forEach(note => (note.rows || []).forEach(r => { if ((r.l && r.l.trim()) || (r.r && r.r.trim())) n++; }));
      return n;
    }
    // Has this device ever pushed real edits this session? Used to decide if a fresh
    // (possibly empty / demo) device is allowed to overwrite a richer cloud copy.
    let localTouched = false;

    async function onAuthed() {
      try {
        setStatus("syncing", "Synchronisation…");
        const exists = await findFile();
        const remote = exists ? await downloadRemote() : null;
        const remoteNotes = (remote && Array.isArray(remote.notes)) ? remote.notes : null;

        if (remoteNotes) {
          const merged = merge(notes, remoteNotes);
          const remoteWords = totalWords(remoteNotes);
          const mergedWords = totalWords(merged);
          const localWords = totalWords(notes);

          // RULE 1 — pull-first safety: a device that hasn't been edited this session and
          // holds less than the cloud must ADOPT the cloud copy and must NOT push.
          // This stops a freshly-opened / empty / demo device from wiping the Drive.
          if (!localTouched && remoteWords > localWords) {
            notes = remoteNotes.slice();
            localStorage.setItem(KEY, JSON.stringify(notes));
            if (typeof render === "function") render();
            setStatus("on", "Notes récupérées du Drive");
            return; // do not push
          }

          // RULE 2 — if merging would still shrink the cloud notably, ask before pushing.
          if (remoteWords - mergedWords >= 5) {
            const ok = window.confirm(
              "Attention : cet appareil contient moins de mots que la version enregistrée sur le Drive.\n\n" +
              "Cet appareil : " + mergedWords + " mots\n" +
              "Sur le Drive : " + remoteWords + " mots\n\n" +
              "Valider = garder cette version (le Drive sera réduit).\n" +
              "Annuler = récupérer plutôt la version du Drive."
            );
            if (!ok) {
              notes = remoteNotes.slice();
              localStorage.setItem(KEY, JSON.stringify(notes));
              if (typeof render === "function") render();
              setStatus("on", "Version du Drive récupérée");
              return;
            }
          }

          const changed = JSON.stringify(merged) !== JSON.stringify(notes);
          notes = merged;
          localStorage.setItem(KEY, JSON.stringify(notes));
          if (changed && typeof render === "function") render();
        } else {
          // No cloud file yet. Only create one if we actually have content,
          // so an empty device doesn't establish an empty cloud baseline.
          if (totalWords(notes) === 0) { setStatus("on", "Connecté"); return; }
        }

        // Keep a timestamped backup copy before overwriting the main file,
        // so a bad overwrite can be recovered.
        await writeBackup({ notes, savedAt: Date.now() });
        await updateFile({ notes, savedAt: Date.now() });
        setStatus("on", "Synchronisé avec Drive");
      } catch (e) {
        console.error("sync error", e);
        setStatus("err", "Erreur de synchro");
      }
    }

    async function doPush() {
      if (!haveValidToken()) return;
      // a manual/auto push means the user has real content on this device
      if (totalWords(notes) > 0) localTouched = true;
      try {
        setStatus("syncing", "Sauvegarde…");
        await updateFile({ notes, savedAt: Date.now() });
        setStatus("on", "Synchronisé avec Drive");
      } catch (e) { setStatus("err", "Erreur de sauvegarde"); }
    }

    return {
      start() {
        if (started) return; started = true;
        setStatus("off", "Connexion à Drive…");
        waitForLibs(() => {
          initGapi(() => { initToken(); ensureToken(false); });
        });
      },
      connect() { // manual tap on the cloud button
        if (!gapiReady || !gisReady) { this.start(); return; }
        ensureToken(true);
      },
      schedulePush() {
        clearTimeout(pushTimer);
        pushTimer = setTimeout(doPush, 1500);
      },
      pullNow() { if (haveValidToken()) onAuthed(); }
    };
  })();


  // ---- history (undo/redo on NOTES, not on the file) ----
  let past = [], future = [];
  function snapshot() { return JSON.parse(JSON.stringify(notes)); }
  // call BEFORE mutating notes
  function pushHistory() { past.push(snapshot()); if (past.length > 60) past.shift(); future = []; updateHistBtns(); }
  function updateHistBtns() {
    const u = document.getElementById("undo"), r = document.getElementById("redo");
    if (u) u.disabled = past.length === 0;
    if (r) r.disabled = future.length === 0;
  }
  function undo() {
    if (!past.length) return;
    future.push(snapshot());
    notes = past.pop();
    store.save(notes); updateHistBtns(); render();
  }
  function redo() {
    if (!future.length) return;
    past.push(snapshot());
    notes = future.pop();
    store.save(notes); updateHistBtns(); render();
  }

  // more primary colours
  const COLORS = [
    { k: "default", bg: "#ffffff" },
    { k: "red",     bg: "#ff6b5e" },
    { k: "orange",  bg: "#ff9f43" },
    { k: "yellow",  bg: "#ffd633" },
    { k: "green",   bg: "#4ad66d" },
    { k: "teal",    bg: "#2bd1c4" },
    { k: "blue",    bg: "#4d96ff" },
    { k: "purple",  bg: "#9b6bff" },
    { k: "pink",    bg: "#ff6bcb" },
    { k: "gray",    bg: "#c4ccd4" },
  ];
  function colorBg(k) { const c = COLORS.find(x => x.k === k); return c ? c.bg : "#ffffff"; }

  function id() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  // data model: note.rows = [{l, r}, ...]
  function migrate(list) {
    const out = list.map(n => {
      let rows = n.rows;
      if (!rows) {
        rows = [];
        (n.body || "").split("\n").forEach(line => {
          let l = line, r = "";
          if (line.includes("\t")) { const p = line.split("\t"); l = p[0]; r = p.slice(1).join(" "); }
          else if (line.includes(" -- ")) { const p = line.split(" -- "); l = p[0]; r = p.slice(1).join(" "); }
          rows.push({ l, r });
        });
        if (!rows.length) rows.push({ l: "", r: "" });
      }
      return { id: n.id, title: n.title || "", color: n.color || "default", rows,
               col: (typeof n.col === "number" ? n.col : null),
               ord: (typeof n.ord === "number" ? n.ord : null),
               userHeight: (typeof n.userHeight === "number" ? n.userHeight : null),
               t: n.t || Date.now() };
    });
    // assign col/ord for any note missing them: distribute in current order across 2 cols
    let needAssign = out.some(n => n.col === null);
    if (needAssign) {
      const counts = [0, 0];
      out.forEach((n, i) => {
        if (n.col === null) { const c = i % 2; n.col = c; n.ord = counts[c]++; }
      });
    }
    return out;
  }

  const seed = [
    { id: id(), title: "Salutations", color: "default", col: 0, ord: 0, rows: [
      { l: "привет", r: "salut" },
      { l: "здравствуйте", r: "bonjour (poli)" },
      { l: "пока", r: "à bientôt" },
      { l: "спасибо", r: "merci" },
    ], t: Date.now() },
    { id: id(), title: "Vocabulaire russe", color: "yellow", col: 1, ord: 0, rows: [
      { l: "быть (inf)", r: "être", head: true },
      { l: "книга", r: "livre" },
      { l: "завтра", r: "demain" },
      { l: "всегда", r: "toujours" },
    ], t: Date.now()-1 },
    { id: id(), title: "À faire", color: "blue", col: 1, ord: 1, rows: [
      { l: "réviser", r: "les verbes" },
      { l: "synchro Drive", r: "plus tard" },
    ], t: Date.now()-2 },
  ];

  let notes = store.load() ? migrate(store.load()) : seed;

  store.save(notes);

  const $ = s => document.querySelector(s);
  const columns = $("#columns");
  const search = $("#search");
  const clearBtn = $("#clear");
  const nav = $("#nav");
  const tally = $("#tally");
  const sheet = $("#sheet");
  const back = $("#back");
  const eTitle = $("#e-title");
  const erows = $("#erows");
  const swatches = $("#swatches");
  const menu = $("#menu");

  let query = "";
  let hits = [];
  let hitIndex = -1;
  let editingId = null;
  let editColor = "default";
  let draft = [];   // working rows in the editor

  function esc(s) { return (s||"").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
  function reEsc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
  function mark(text) {
    const safe = esc(text);
    if (!query) return safe;
    return safe.replace(new RegExp("(" + reEsc(query) + ")", "gi"), "<mark>$1</mark>");
  }
  function noteText(n) { return n.title + "\n" + n.rows.map(r => r.l + " " + r.r).join("\n"); }
  function matches(n) { return !query || noteText(n).toLowerCase().includes(query.toLowerCase()); }

  // ---- pointer-based long-press drag to reorder notes ----
  let dragState = null;
  function attachDrag(card, noteId) {
    const handle = card.querySelector(".draghandle");
    let startX, startY, dragging = false, ghost = null;
    let dragArmed = false, armTimer = null;

    // tap counting on the handle: 2 taps arm drag, 3 taps -> resize
    let tapCount = 0, tapTimer = null;
    handle.addEventListener("click", (e) => {
      e.stopPropagation();
      tapCount++;
      clearTimeout(tapTimer);
      if (tapCount === 2) {
        // arm drag: a subsequent press+move on the handle will drag
        dragArmed = true;
        handle.classList.add("armed");
        clearTimeout(armTimer);
        armTimer = setTimeout(() => { dragArmed = false; handle.classList.remove("armed"); }, 1500);
      }
      if (tapCount >= 3) {
        tapCount = 0;
        dragArmed = false; handle.classList.remove("armed"); clearTimeout(armTimer);
        enterResizeMode(card, noteId);
        return;
      }
      tapTimer = setTimeout(() => { tapCount = 0; }, 450);
    });

    function pointerDown(e) {
      if (e.button === 1 || e.button === 2) return;
      const pt = e.touches ? e.touches[0] : e;
      startX = pt.clientX; startY = pt.clientY;
      const onHandle = !!e.target.closest(".draghandle");
      // only the handle, and only once drag has been armed by a double-click, can start a drag
      if (onHandle && dragArmed) {
        document.addEventListener("pointermove", checkMove);
        document.addEventListener("pointerup", pointerUp, { once: true });
        return;
      }
      // body press or un-armed handle press: do nothing special (no long-press drag)
    }
    function checkMove(e) {
      if (dragging) { onDrag(e); return; }
      const movedFar = Math.abs(e.clientX - startX) > 6 || Math.abs(e.clientY - startY) > 6;
      if (movedFar && dragArmed) { beginDrag(e); }
    }
    function beginDrag(pt) {
      dragging = true;
      dragArmed = false; handle.classList.remove("armed"); clearTimeout(armTimer);
      card.dataset.suppressClick = "1";
      card.classList.add("dragging");
      if (navigator.vibrate) navigator.vibrate(8);
      ghost = card.cloneNode(true);
      ghost.classList.add("drag-ghost");
      ghost.style.position = "fixed";
      ghost.style.pointerEvents = "none";
      ghost.style.width = card.offsetWidth + "px";
      ghost.style.left = card.getBoundingClientRect().left + "px";
      ghost.style.top = card.getBoundingClientRect().top + "px";
      ghost.style.zIndex = 999;
      ghost.style.opacity = ".95";
      ghost.style.transform = "scale(1.03)";
      ghost.style.boxShadow = "0 12px 30px rgba(0,0,0,.25)";
      ghost.classList.remove("dragging");
      document.body.appendChild(ghost);
      dragState = { id: noteId, offY: pt.clientY - card.getBoundingClientRect().top, offX: pt.clientX - card.getBoundingClientRect().left };
    }
    function onDrag(e) {
      if (!ghost) return;
      ghost.style.left = (e.clientX - dragState.offX) + "px";
      ghost.style.top = (e.clientY - dragState.offY) + "px";
      ghost.style.display = "none";
      const el = document.elementFromPoint(e.clientX, e.clientY);
      ghost.style.display = "";
      document.querySelectorAll(".card.dragover-top, .card.dragover-bot").forEach(c => c.classList.remove("dragover-top","dragover-bot"));
      document.querySelectorAll(".col.coltarget").forEach(c => c.classList.remove("coltarget"));
      const over = el && el.closest(".card");
      if (over && over !== card) {
        const rect = over.getBoundingClientRect();
        over.classList.add(e.clientY > rect.top + rect.height/2 ? "dragover-bot" : "dragover-top");
      } else {
        const col = el && el.closest(".col");
        if (col) col.classList.add("coltarget");
      }
    }
    function pointerUp(e) {
      document.removeEventListener("pointermove", checkMove);
      if (!dragging) { return; }
      dragging = false;
      ghost && ghost.style && (ghost.style.display = "none");
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const over = el && el.closest(".card");
      const col = el && el.closest(".col");
      if (ghost) { ghost.remove(); ghost = null; }
      document.querySelectorAll(".drag-ghost").forEach(g => g.remove());
      card.classList.remove("dragging");
      document.querySelectorAll(".card.dragover-top, .card.dragover-bot").forEach(c => c.classList.remove("dragover-top","dragover-bot"));
      document.querySelectorAll(".col.coltarget").forEach(c => c.classList.remove("coltarget"));
      if (over && over.dataset.id && over.dataset.id !== noteId) {
        dropOnCard(noteId, over.dataset.id, e.clientY);
      } else if (col && col.dataset.col != null) {
        dropInColumn(noteId, parseInt(col.dataset.col, 10));
      }
      setTimeout(() => { delete card.dataset.suppressClick; }, 50);
    }
    handle.addEventListener("pointerdown", pointerDown);
    card.addEventListener("pointerdown", pointerDown);
  }

  // drop onto a target card (above/below) OR onto an empty column drop-zone
  function dropOnCard(fromId, toId, clientY) {
    const moved = notes.find(n => n.id === fromId);
    const target = notes.find(n => n.id === toId);
    if (!moved || !target || fromId === toId) return false;
    pushHistory();
    const destCol = target.col;
    const rect = columns.querySelector(`.card[data-id="${toId}"]`)?.getBoundingClientRect();
    const after = rect ? (clientY > rect.top + rect.height / 2) : false;
    moveInto(moved, destCol, target.ord + (after ? 1 : 0));
    commitOrder();
    return true;
  }
  function dropInColumn(fromId, destCol) {
    const moved = notes.find(n => n.id === fromId);
    if (!moved) return false;
    pushHistory();
    const count = notes.filter(n => n.col === destCol && n.id !== fromId).length;
    moveInto(moved, destCol, count); // append at end
    commitOrder();
    return true;
  }
  function moveInto(moved, destCol, destIndex) {
    // pull moved out of its column ordering, then insert at destIndex in destCol
    const fromCol = moved.col;
    // shift down items in source col after moved (handled by normalize later)
    moved.col = destCol;
    // make room: bump ord of items at/after destIndex in destCol
    notes.filter(n => n.col === destCol && n !== moved && n.ord >= destIndex)
         .forEach(n => n.ord += 1);
    moved.ord = destIndex;
  }
  function commitOrder() { normalizeOrder(); store.save(notes); render(); }

  // shrink a single-line element's font-size until its content fits its width (no wrap)
  function fitText(el, maxPx, minPx) {
    if (!el) return;
    el.style.fontSize = maxPx + "px";
    if (el.scrollWidth <= el.clientWidth + 1) return; // already fits
    // compute the ratio needed and apply directly, clamped to minPx
    const ratio = el.clientWidth / el.scrollWidth;
    let size = Math.max(minPx, Math.floor(maxPx * ratio * 100) / 100);
    el.style.fontSize = size + "px";
    // fine-tune a couple of steps in case of rounding
    let guard = 0;
    while (el.scrollWidth > el.clientWidth + 1 && size > minPx && guard < 12) {
      size = Math.max(minPx, size - 0.5); guard++;
      el.style.fontSize = size + "px";
    }
  }
  function fitCellsIn(root, maxPx, minPx) {
    root.querySelectorAll(".cell").forEach(c => {
      if (c.textContent.trim()) fitText(c, maxPx, minPx);
    });
  }

  // resize mode: drag the bottom of the card to set a fixed height, OK to confirm
  function enterResizeMode(card, noteId) {
    const note = notes.find(n => n.id === noteId);
    if (!note) return;
    const grid = card.querySelector(".grid");
    if (!grid) return;
    card.classList.add("resizing");
    grid.style.overflow = "hidden";
    // start from current rendered height
    let h = note.userHeight || Math.min(210, grid.scrollHeight);
    grid.style.maxHeight = h + "px";

    // bottom drag bar
    const bar = document.createElement("div");
    bar.className = "resizebar";
    bar.innerHTML = `<span class="resizegrip">⇕ étirer</span><button class="resizeok">OK</button>`;
    card.appendChild(bar);

    const grip = bar.querySelector(".resizegrip");
    const okBtn = bar.querySelector(".resizeok");

    let dragging = false, startY = 0, startH = 0;
    function down(e) {
      dragging = true;
      const pt = e.touches ? e.touches[0] : e;
      startY = pt.clientY; startH = h;
      e.preventDefault(); e.stopPropagation();
      document.addEventListener("pointermove", move);
      document.addEventListener("pointerup", up, { once: true });
    }
    function move(e) {
      if (!dragging) return;
      const pt = e.touches ? e.touches[0] : e;
      h = Math.max(40, Math.min(1200, startH + (pt.clientY - startY)));
      grid.style.maxHeight = h + "px";
    }
    function up() { dragging = false; document.removeEventListener("pointermove", move); }
    grip.addEventListener("pointerdown", down);

    function finish(e) {
      if (e) e.stopPropagation();
      note.userHeight = Math.round(h);
      store.save(notes);
      card.classList.remove("resizing");
      bar.remove();
      render();
    }
    okBtn.addEventListener("click", finish);
  }

  function buildCard(note) {
    const card = document.createElement("article");
    card.className = "card";
    card.style.background = colorBg(note.color);
    if (note.color !== "default") { card.style.borderColor = "transparent"; card.classList.add("coloured"); }
    if (query) { if (matches(note)) card.classList.add("match"); else card.classList.add("dim"); }
    card.dataset.id = note.id;

    let html = `<span class="draghandle" aria-label="Déplacer">⠿</span>`;
    if (note.title) html += `<h3 class="card-title">${mark(note.title)}</h3>`;
    const matchRows = [];
    html += `<div class="card-body clamp"><div class="grid">`;
    const PREVIEW_CAP = 14;
    const SEARCH_CAP = 30; // max matching rows shown per card while searching
    const q = query ? query.toLowerCase() : "";
    const totalContentRows = note.rows.filter(r => r.l || r.r).length;

    if (query) {

      html += `</div>`;

        const pct = Math.round((ri / total) * 100);

  const NCOLS = 2;

  function normalizeOrder() {

    for (let c = 0; c < NCOLS; c++) {
      const inCol = notes.filter(n => n.col === c).sort((a,b) => a.ord - b.ord);
      inCol.forEach((n, i) => n.ord = i);
    }
  }

  // signature captures everything that affects a card's rendered appearance,
  // so we can skip rebuilding cards that haven't changed (Keep-like fluidity).
  function cardSig(note) {
    return note.id + "|" + note.color + "|" + note.col + "|" + note.ord + "|" +

    if (cols.length !== NCOLS) {
      columns.innerHTML = "";

      for (let i = 0; i < NCOLS; i++) {
        const c = document.createElement("div"); c.className = "col"; c.dataset.col = i;
        columns.appendChild(c); cols.push(c);
      }
      cardCache = {};
    }

    let anyMatch = false;
    const liveIds = new Set();
    const changedCards = [];

    for (let c = 0; c < NCOLS; c++) {
      const col = cols[c];
      const inCol = notes.filter(n => n.col === c).sort((a,b) => a.ord - b.ord);
      // desired order of child elements for this column
      const desired = [];
      inCol.forEach(note => {
        liveIds.add(note.id);
        if (query && matches(note)) anyMatch = true;
        const sig = cardSig(note);
        let entry = cardCache[note.id];
        if (!entry || entry.sig !== sig) {
          const el = buildCard(note);
          entry = { el, sig };
          cardCache[note.id] = entry;
          changedCards.push(el);
        }
        desired.push(entry.el);
      });

      let drop = col.querySelector(":scope > .coldrop");
      if (!drop) { drop = document.createElement("div"); drop.className = "coldrop"; drop.dataset.col = c; }

      Array.from(col.querySelectorAll(":scope > .card")).forEach(el => {
        if (!desired.includes(el)) el.remove();
      });
      // place each desired card in order (insertBefore is a no-op-ish move if already correct)
      desired.forEach((el, i) => {
        const currentAtI = col.children[i];
        if (currentAtI !== el) col.insertBefore(el, currentAtI || null);

      col.appendChild(drop);

    });

    if (changedCards.length) {

    }
  }

  function rebuildHits() {

  // parse a pasted block into rows; detect section headers (a line followed by a lone "-")

  // scroll the sheet-body so the cell sits in the middle of the area visible above the keyboard

  // Complete only one section: from the header row down to (but excluding) the next header.
  function sectionRange(headerIdx) {

  // Robustly parse Gemini's JSON, salvaging a truncated array if the response was cut off.
  function parseAiItems(text) {
    const clean = (text || "").replace(/```json|```/g, "").trim();
    // 1) straight parse
    try { const p = JSON.parse(clean); if (p && Array.isArray(p.items)) return p.items; } catch (e) {}
    // 2) parse just the {...} block
    const braced = clean.match(/\{[\s\S]*\}/);
    if (braced) { try { const p = JSON.parse(braced[0]); if (p && Array.isArray(p.items)) return p.items; } catch (e) {} }
    // 3) salvage: extract each complete {"ru":...,"fr":...} object even if the array is truncated
    const items = [];
    const objRe = /\{[^{}]*?"ru"\s*:\s*"(?:[^"\\]|\\.)*"[^{}]*?"fr"\s*:\s*"(?:[^"\\]|\\.)*"[^{}]*?\}/g;
    let m;
    while ((m = objRe.exec(clean)) !== null) {
      try { const o = JSON.parse(m[0]); if (o.ru && o.fr) items.push(o); } catch (e) {}
    }
    return items;
  }

  async function aiRun(words, insertAt) {
    aiModal.innerHTML = `<div class="ai-status"><span class="ai-spin"></span>Analyse en cours…<br><span style="font-size:12px">Gemini complète les formes manquantes</span></div>`;

      "Pour chaque mot pertinent, propose les formes grammaticales UTILES manquantes : pour un VERBE, sa conjugaison au présent (я/ты/он/мы/вы/они) et l'infinitif ; pour un NOM ou ADJECTIF, ses déclinaisons principales (nominatif, accusatif, génitif, datif, instrumental, prépositionnel) au singulier, et le pluriel si utile. " +

  function importNotesFromObject(obj) {
    const incoming = (obj && Array.isArray(obj.notes)) ? obj.notes
                   : (Array.isArray(obj) ? obj : null);
    if (!incoming) { alert("Fichier non reconnu : il doit s'agir d'un export JSON de l'app."); return; }
    // count words per column so imported notes append at the bottom of each column
    const maxOrd = [0, 0];
    notes.forEach(n => { const c = n.col || 0; maxOrd[c] = Math.max(maxOrd[c], (n.ord || 0) + 1); });
    let added = 0, addedWords = 0;
    incoming.forEach((n, i) => {
      if (!n || !Array.isArray(n.rows)) return;
      const col = (n.col === 1) ? 1 : 0;
      const note = {
        id: id(),                         // fresh id to avoid clobbering existing notes
        title: n.title || "",
        color: n.color || "default",
        col,
        ord: maxOrd[col]++,
        userHeight: n.userHeight || null,
        rows: n.rows.map(r => ({ l: r.l || "", r: r.r || "", head: !!r.head, mark: r.mark === 2 ? 2 : 0 })),
        t: Date.now() + i
      };
      notes.push(note);
      added++;
      addedWords += note.rows.filter(r => r.l || r.r).length;
    });
    if (!added) { alert("Aucune note valide trouvée dans ce fichier."); return; }
    pushHistory();
    store.save(notes);
    render();
    cloud.schedulePush();
    alert(added + (added > 1 ? " notes ajoutées" : " note ajoutée") + " (" + addedWords + " mots).");
  }
  const _importBtn = document.getElementById("import");
  const _importFile = document.getElementById("importfile");
  if (_importBtn && _importFile) {
    _importBtn.addEventListener("click", () => _importFile.click());
    _importFile.addEventListener("change", () => {
      const file = _importFile.files && _importFile.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try { importNotesFromObject(JSON.parse(reader.result)); }
        catch (e) { alert("Impossible de lire le fichier : JSON invalide."); }
        _importFile.value = ""; // allow re-importing the same file later
      };
      reader.onerror = () => { alert("Erreur de lecture du fichier."); _importFile.value = ""; };
      reader.readAsText(file);
    });
  }
  document.getElementById("redo").addEventListener("click", redo);
  updateHistBtns();

  // Drive sync: start automatically, allow manual (re)connect via the cloud button,
  // and pull periodically + when the app regains focus.
  document.getElementById("cloud").addEventListener("click", () => cloud.connect());

  // count "words" = non-empty lines (a line counts if its left or right cell has text)
  function countNoteWords(note) {
    if (!note || !note.rows) return 0;
    let n = 0;
    note.rows.forEach(r => { if ((r.l && r.l.trim()) || (r.r && r.r.trim())) n++; });
    return n;
  }
  function countAllWords() {
    return notes.reduce((sum, n) => sum + countNoteWords(n), 0);
  }
  // tap the title to toggle between the app name and the total word count
  let brandShowsCount = false;
  const brandEl = document.getElementById("brand");
  function renderBrand() {
    if (!brandEl) return;
    if (brandShowsCount) {
      const c = countAllWords();
      brandEl.textContent = c + (c > 1 ? " mots" : " mot");
      brandEl.classList.add("counting");
    } else {
      brandEl.innerHTML = 'Нюма <span>Галипов</span>';
      brandEl.classList.remove("counting");
    }
  }
  if (brandEl) brandEl.addEventListener("click", () => { brandShowsCount = !brandShowsCount; renderBrand(); syncHeaderHeight(); });
  cloud.start();
  // show stored version + last-save time on launch
  try { setSavedAt(parseInt(localStorage.getItem(SAVED_KEY) || "0", 10) || Date.now()); } catch (e) { setSavedAt(Date.now()); }
  setInterval(() => cloud.pullNow(), 30000);
  document.addEventListener("visibilitychange", () => { if (!document.hidden) cloud.pullNow(); });

  render();
  requestAnimationFrame(syncHeaderHeight);
})();
</script>
<script>
  // Register the service worker for offline use + instant loads.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>
