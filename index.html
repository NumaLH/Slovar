  :root {
    --bg: #fbf9f4;
    --surface: #ffffff;
    --ink: #1f1c17;
    --ink-soft: #6b6358;
    --line: #e7e1d6;
    --accent: #c8693a;
    --accent-soft: #fbe3d3;
    --hit: #ffd54a;
    --hit-active: #ff9e2c;
    --rule: #1f1c17;
    --shadow: 0 1px 2px rgba(40,32,20,.06), 0 4px 14px rgba(40,32,20,.05);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
    height: 100dvh; overflow: hidden;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0;
    transform: translateY(var(--vv-top, 0px));
    padding: max(env(safe-area-inset-top), 12px) 14px 10px;
    background: #0c0b0a;
    border-bottom: 1px solid #000; z-index: 45;
  }
  /* main content sits below the fixed header */
  main { margin-top: var(--header-h, 0px); }
  .titlerow { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .brandwrap { text-align: left; flex: 0 1 auto; min-width: 0; }
  .histwrap { flex: 0 0 auto; }
  .brand {
    font-family: 'SlavonTitle', 'PT Serif', Georgia, serif;
    font-weight: 400; font-size: 22px; line-height: 1; letter-spacing: .5px;
    color: #ffffff; white-space: nowrap; cursor: pointer; user-select: none;
  }
  .brand span { color: #ffffff; }
  .brand.counting { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 700; font-size: 20px; }
  .syncpill { font-size: 11px; color: #b8b0a4; background: #1c1a17; border: 1px solid #2a2723; border-radius: 20px; padding: 3px 9px; }
  .histbtn { width: 30px; height: 30px; border-radius: 9px; border: 1px solid #2a2723; background: #1c1a17; color: #cfc7ba; font-size: 15px; cursor: pointer; display: grid; place-items: center; }
  .cloudbtn svg { display: block; }
  .verinfo { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; margin-right: 2px; }
  .verinfo .ver { font-size: 9px; color: #8a8276; font-weight: 600; }
  .verinfo .savedat { font-size: 9px; color: #b8b0a4; font-variant-numeric: tabular-nums; }
  .cloudbtn .cloud-check { opacity: 0; }
  #cloud.off { color: #8a8276; background: #1c1a17; border-color: #2a2723; }
  #cloud.syncing { color: #ffd633; background: #2a2410; border-color: #5a4e16; }
  #cloud.syncing svg { animation: cloudspin 1.1s linear infinite; transform-origin: center; }
  #cloud.on { color: #0c0b0a; background: #4ad66d; border-color: #4ad66d; }
  #cloud.on .cloud-check { opacity: 1; }
  #cloud.err { color: #fff; background: #ff5247; border-color: #ff5247; }
  @keyframes cloudspin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .histbtn:active { transform: scale(.92); }
  .histbtn:disabled { opacity: .32; cursor: default; }

  .searchwrap { position: relative; display: flex; align-items: center; gap: 6px; }
  .searchbox {
    flex: 1 1 auto; min-width: 0; display: flex; align-items: center;
    background: #ffffff; border: 1.5px solid #000;
    border-radius: 14px; padding: 0 10px;
    transition: border-color .15s;
  }
  .searchbox:focus-within { border-color: var(--accent); }
  .searchbox svg { width: 18px; height: 18px; color: var(--ink-soft); flex: 0 0 auto; }
  #search { flex: 1; border: none; outline: none; background: transparent; font: inherit; font-size: 16px; padding: 11px 8px; color: var(--ink); min-width: 0; }
  /* hide the browser's built-in search clear (×) so only our button shows */
  #search::-webkit-search-cancel-button, #search::-webkit-search-decoration { -webkit-appearance: none; appearance: none; }
  .nav { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink-soft); white-space: nowrap; flex: 0 0 auto; }
  .nav button { border: none; background: var(--accent-soft); color: var(--accent); width: 28px; height: 30px; border-radius: 9px; font-size: 16px; font-weight: 700; cursor: pointer; display: grid; place-items: center; }
  .nav button:active { transform: scale(.92); }
  .nav .tally { min-width: 32px; text-align: center; font-variant-numeric: tabular-nums; font-size: 11px; }
  .clearbtn { border: none; background: transparent; color: var(--ink-soft); font-size: 20px; line-height: 1; cursor: pointer; padding: 4px 2px; flex: 0 0 auto; }

  main {
    flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
    padding: 14px 5px calc(96px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
  }
  .columns { display: flex; gap: 6px; align-items: flex-start; }
  .col { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; gap: 6px; min-height: 120px; border-radius: 16px; transition: background .12s; }
  .col.coltarget { background: rgba(200,105,58,.10); }
  .coldrop { flex: 1 1 auto; min-height: 60px; }
  .card {
    break-inside: avoid; background: var(--surface);
    border: 1px solid var(--line); border-radius: 16px;
    padding: 13px 10px 12px; margin: 0 0 10px; box-shadow: var(--shadow);
    cursor: pointer; transition: transform .12s; position: relative;
  }
  .card:active { transform: scale(.985); }
  .card.dim { opacity: .35; }
  .card.match { box-shadow: var(--shadow), 0 0 0 2px var(--accent); }
  .card.dragging { opacity: .4; }
  .card.dragover-top { box-shadow: var(--shadow), 0 -3px 0 0 var(--accent); }
  .card.dragover-bot { box-shadow: var(--shadow), 0 3px 0 0 var(--accent); }
  .draghandle { position: absolute; top: 8px; right: 10px; color: var(--ink-soft); font-size: 16px; cursor: grab; opacity: .45; touch-action: none; padding: 4px; line-height: 1; }
  .card.coloured .draghandle { color: rgba(0,0,0,.5); }
  .draghandle.armed { color: var(--accent); opacity: 1; transform: scale(1.25); }
  .card-title { font-weight: 700; font-size: 15px; line-height: 1.25; margin: 0 0 5px; letter-spacing: -0.01em; }

  /* two-column note display with central rule */
  .grid { position: relative; }
  .grid::before {
    content: ""; position: absolute; top: 0; bottom: 0; left: 50%;
    width: 1.5px; background: var(--rule); opacity: .85; transform: translateX(-50%);
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; align-items: baseline; }
  .cell { font-size: 13.5px; line-height: 1.3; padding: 0 9px; min-height: 1em; white-space: nowrap; overflow: hidden; }
  .cell.l { text-align: right; }
  .cell.r { text-align: left; color: var(--ink); }
  .row.head { margin-top: 9px; }
  .row.endmark { margin-bottom: 6px; }
  .row.head:first-child { margin-top: 0; }
  .row.head .cell { font-weight: 700; }
  .row.spacer { height: 10px; }
  .card-body { padding-bottom: 6px; }
  .card-body.clamp { position: relative; }
  .card-body.clamp .grid { max-height: 210px; overflow: hidden; }
  /* fade at the bottom when clamped to hint there's more */
  .card-body.clamp.clipped::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 28px;
    background: linear-gradient(transparent, var(--card-bg, #fff));
    pointer-events: none;
  }
  /* match position indicator rail on the right edge */
  .hitrail {
    position: absolute; top: 40px; bottom: 12px; right: 5px; width: 4px;
    border-radius: 3px; background: rgba(0,0,0,.07);
  }
  .card.coloured .hitrail { background: rgba(0,0,0,.12); }
  .hitdot {
    position: absolute; right: -2px; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); transform: translateY(-50%);
    box-shadow: 0 0 0 1.5px var(--surface);
  }
  .card.coloured .hitdot { box-shadow: 0 0 0 1.5px rgba(255,255,255,.6); }
  .hitdot.current {
    width: 11px; height: 11px; right: -3.5px;
    box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--accent);
    z-index: 2;
  }
  .card.coloured .hitdot.current { box-shadow: 0 0 0 2px rgba(255,255,255,.85), 0 0 0 4px var(--accent); }
  /* resize mode */
  .card.resizing { box-shadow: var(--shadow), 0 0 0 2px var(--accent); cursor: default; }
  .resizebar {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--accent);
    gap: 8px;
  }
  .resizegrip {
    flex: 1; text-align: center; font-size: 13px; font-weight: 600;
    color: var(--accent); background: var(--accent-soft);
    padding: 8px 6px; border-radius: 10px; cursor: ns-resize; user-select: none;
    touch-action: none;
  }
  .resizeok {
    border: none; background: var(--accent); color: #fff; font: inherit;
    font-size: 14px; font-weight: 700; padding: 8px 16px; border-radius: 10px; cursor: pointer;
  }
  .resizeok:active { transform: scale(.95); }

  mark { background: var(--hit); color: var(--ink); border-radius: 3px; padding: 0 1px; }
  mark.current { background: var(--hit-active); box-shadow: 0 0 0 2px var(--hit-active); }
  .empty { column-span: all; text-align: center; color: var(--ink-soft); padding: 60px 20px; font-size: 14px; }
  .empty b { color: var(--ink); display: block; font-size: 16px; margin-bottom: 4px; }

  .fab {
    position: fixed; right: 18px; bottom: calc(20px + env(safe-area-inset-bottom));
    width: 58px; height: 58px; border-radius: 20px; border: none;
    background: #0c0b0a; color: #ffe14d; font-size: 32px; font-weight: 400;
    box-shadow: 0 6px 20px rgba(0,0,0,.35); cursor: pointer;
    display: grid; place-items: center; z-index: 30;
  }
  .fab:active { transform: scale(.93); }

  /* editor */
  .sheet-back { position: fixed; left: 0; right: 0; bottom: 0; top: var(--sheet-top, var(--header-h, 0px)); background: rgba(31,28,23,.32); backdrop-filter: blur(2px); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 40; }
  .sheet-back.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: var(--kb-bottom, 0px);
    top: var(--sheet-top, var(--header-h, 0px));
    background: var(--surface); border-radius: 22px 22px 0 0;
    box-shadow: 0 -8px 40px rgba(31,28,23,.2);
    transform: translateY(110%); transition: transform .26s cubic-bezier(.32,.72,0,1);
    z-index: 50; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom);
  }
  .sheet.open { transform: translateY(0); }
  body.kb-open .sheet { border-radius: 22px; }
  /* scroll position rail inside the editor */
  .scrollrail {
    position: absolute; right: 5px; top: var(--rail-top, 56px); bottom: 12px; width: 4px;
    border-radius: 3px; background: rgba(0,0,0,.07);
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 3;
  }
  .scrollrail.show { opacity: 1; }
  .scrollthumb {
    position: absolute; right: -2px; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); opacity: .9; top: 0;
    box-shadow: 0 0 0 1.5px var(--surface);
    transform: translateY(-50%);
    transition: top .05s linear;
  }
  .sheet-head { display: flex; align-items: center; gap: 10px; padding: 12px 12px 8px; flex: 0 0 auto; border-bottom: 1px solid var(--line); }
  .sheet-head button { border: none; background: transparent; font: inherit; font-size: 16px; color: var(--accent); font-weight: 600; cursor: pointer; padding: 8px 6px; flex: 0 0 auto; }
  .sheet-head #done { padding: 8px 10px; }
  .wordcount { font-size: 11px; color: var(--ink-soft); white-space: nowrap; flex: 0 0 auto; opacity: .8; }
  .ednav { display: flex; align-items: center; gap: 6px; margin-left: auto; margin-right: 6px; }
  .ednav .edtally { font-size: 12px; color: var(--ink-soft); font-variant-numeric: tabular-nums; min-width: 30px; text-align: center; }
  .ednav button { background: var(--accent-soft); color: var(--accent); width: 30px; height: 30px; border-radius: 9px; font-size: 17px; font-weight: 700; padding: 0; display: grid; place-items: center; }
  .ednav button:active { transform: scale(.92); }
  .dots { font-size: 22px !important; color: var(--ink-soft) !important; line-height: 1; }

  /* popover menu for ⋯ */
  .menu {
    position: absolute; top: 48px; right: 12px; z-index: 55;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; box-shadow: 0 10px 30px rgba(31,28,23,.18);
    padding: 10px; width: 232px; display: none;
  }
  .menu.open { display: block; }
  .menu h4 { margin: 2px 4px 8px; font-size: 12px; color: var(--ink-soft); font-weight: 600; }
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(31,28,23,.12); cursor: pointer; position: relative; }
  .swatch.sel { border-color: var(--ink); }
  .swatch.sel::after { content: "✓"; position: absolute; inset: 0; display: grid; place-items: center; font-size: 13px; color: #fff; font-weight: 800; text-shadow: 0 0 2px rgba(0,0,0,.4); }
  .menu .danger { width: 100%; text-align: left; border: none; background: transparent; font: inherit; font-size: 14px; color: #c0392b; padding: 8px 6px; cursor: pointer; border-top: 1px solid var(--line); }

  .sheet-body { overflow-y: auto; padding: 8px 12px 18px; flex: 1 1 auto; scrollbar-width: none; -ms-overflow-style: none; }
  .sheet-body::-webkit-scrollbar { width: 0; height: 0; display: none; }
  #e-title {
    flex: 1 1 auto; min-width: 0; box-sizing: border-box;
    border: none; outline: none;
    font: inherit; font-size: 19px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink);
    background: transparent;
    padding: 6px 2px;
  }

  /* editable rows */
  .erows { position: relative; }
  .erow { display: grid; grid-template-columns: 20px 1fr 36px 1fr; align-items: stretch; gap: 0; position: relative; }
  .erow.head { margin-top: 12px; }
  .erow.endmark { margin-bottom: 7px; }
  .erow.head:first-child { margin-top: 0; }
  .erow.head .ecell { font-weight: 700; }
  /* central rule per row (aligned to the speak column) */
  .erow::before { content: ""; position: absolute; top: 0; bottom: 0; left: calc(20px + (100% - 20px - 36px)/2 + (36px/2) - .75px); width: 1.5px; background: var(--rule); opacity: .85; }
  .sectoggle {
    grid-column: 1; align-self: start; margin-top: 6px; justify-self: center;
    width: 18px; height: 18px; border-radius: 5px; border: none;
    background: transparent; color: var(--ink-soft); cursor: pointer;
    font-size: 13px; line-height: 1; display: grid; place-items: center; opacity: .5;
  }
  .sectoggle:active { transform: scale(.9); }
  .erow.head .sectoggle { color: var(--accent); opacity: 1; }
  .ecell {
    border: none; outline: none; background: transparent; font: inherit; font-size: 16px;
    line-height: 1.35; padding: 4px 10px; resize: none; color: var(--ink);
    overflow: hidden; min-height: 30px; white-space: nowrap;
  }
  .ecell.l { text-align: right; grid-column: 2; }
  .ecell.r { text-align: left; grid-column: 4; }
  .speak {
    grid-column: 3; align-self: center; justify-self: center;
    width: 26px; height: 26px; border-radius: 50%; border: none;
    background: var(--accent-soft); color: var(--accent); cursor: pointer;
    display: grid; place-items: center; font-size: 12px;
    position: relative; z-index: 2;
  }
  .speak:active { transform: scale(.9); }
  .speak.playing { background: var(--accent); color: #fff; }
  .erow.blank .speak { visibility: hidden; }
  .erow.blank .ecell::placeholder { color: transparent; }
  .erows-spacer { min-height: 90px; cursor: text; }
  ::placeholder { color: #c3bbac; }

  @media (min-width: 620px) { main { padding-left: 18px; padding-right: 18px; } }
</style>
</head>
<body>
  <header>
    <div class="titlerow">
      <div class="brandwrap"><span class="brand" id="brand">Нюма <span>Галипов</span></span></div>
      <div class="histwrap" style="display:flex; align-items:center; gap:4px;">
        <div class="verinfo" id="verinfo">
          <span class="ver" id="ver">v1.0</span>
          <span class="savedat" id="savedat">—</span>
        </div>
        <button class="histbtn cloudbtn" id="cloud" title="Synchronisation Drive" aria-label="Synchronisation Drive">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a4.5 4.5 0 0 0 .5-8.97A6 6 0 0 0 6.34 9.5 4 4 0 0 0 7 17.5"/><path class="cloud-check" d="M9.5 13.5l2 2 3.5-3.5"/><path class="cloud-spin" d="M12 12v0"/></svg>
        </button>
        <button class="histbtn" id="undo" title="Annuler" aria-label="Annuler">↶</button>
        <button class="histbtn" id="redo" title="Rétablir" aria-label="Rétablir">↷</button>
      </div>
    </div>
    <div class="searchwrap">
      <div class="searchbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="search" placeholder="Rechercher un mot…" autocomplete="off" autocapitalize="off">
        <button class="clearbtn" id="clear" hidden>×</button>
      </div>
      <div class="nav" id="nav" hidden>
        <span class="tally" id="tally">0/0</span>
        <button id="prev" aria-label="Précédent">‹</button>
        <button id="next" aria-label="Suivant">›</button>
      </div>
    </div>
  </header>

  <main id="board"><div class="columns" id="columns"></div></main>

  <button class="fab" id="add" aria-label="Nouvelle note">+</button>

  <div class="sheet-back" id="back"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-head">
      <input id="e-title" placeholder="Titre">
      <span class="wordcount" id="wordcount"></span>
      <button class="dots" id="opts" aria-label="Options">⋯</button>
      <button id="done">OK</button>
      <div class="menu" id="menu">
        <h4>Couleur</h4>
        <div class="swatches" id="swatches"></div>
        <button class="danger" id="delete">Supprimer la note</button>
      </div>
    </div>
    <div class="sheet-body" id="sheet-body">
      <div class="erows" id="erows"></div>
      <div class="erows-spacer" id="erows-spacer"></div>
    </div>
    <div class="scrollrail" id="scrollrail"><div class="scrollthumb" id="scrollthumb"></div></div>
  </div>

  function fmtDate(ts) {
    if (!ts) return "—";
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, "0");
    return pad(d.getDate()) + "/" + pad(d.getMonth() + 1) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

    if (v) v.textContent = VERSION;

        callback: (resp) => {
          if (resp.error) { setStatus("err", "Erreur de connexion"); return; }
          accessToken = resp.access_token;
          tokenExpiry = Date.now() + (resp.expires_in ? resp.expires_in * 1000 : 3000000) - 60000;

      try {

        "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" +
        JSON.stringify(content) + "\r\n--" + boundary + "--";
      const res = await gapi.client.request({
        path: "/upload/drive/v3/files",

    function merge(local, remote) {
      const byId = {};

      (local || []).forEach(n => {
        const ex = byId[n.id];
        if (!ex || (n.t || 0) >= (ex.t || 0)) byId[n.id] = n;

      return Object.values(byId).sort((a, b) => {
        if (a.col !== b.col) return (a.col||0) - (b.col||0);
        return (a.ord||0) - (b.ord||0);
      });

      arr.forEach(note => (note.rows || []).forEach(r => { if ((r.l && r.l.trim()) || (r.r && r.r.trim())) n++; }));

        setStatus("syncing", "Sauvegarde…");

        setStatus("on", "Synchronisé avec Drive");
      } catch (e) { setStatus("err", "Erreur de sauvegarde"); }
    }

    return {
      start() {
        if (started) return; started = true;
        setStatus("off", "Connexion à Drive…");
        waitForLibs(() => {
          initGapi(() => { initToken(); ensureToken(false); });
        });
      },
      connect() { // manual tap on the cloud button
        if (!gapiReady || !gisReady) { this.start(); return; }
        ensureToken(true);
      },
      schedulePush() {
        clearTimeout(pushTimer);
        pushTimer = setTimeout(doPush, 1500);
      },
      pullNow() { if (haveValidToken()) onAuthed(); }
    };
  })();


  // ---- history (undo/redo on NOTES, not on the file) ----
  let past = [], future = [];
  function snapshot() { return JSON.parse(JSON.stringify(notes)); }
  // call BEFORE mutating notes
  function pushHistory() { past.push(snapshot()); if (past.length > 60) past.shift(); future = []; updateHistBtns(); }
  function updateHistBtns() {
    const u = document.getElementById("undo"), r = document.getElementById("redo");
    if (u) u.disabled = past.length === 0;
    if (r) r.disabled = future.length === 0;
  }
  function undo() {
    if (!past.length) return;
    future.push(snapshot());
    notes = past.pop();
    store.save(notes); updateHistBtns(); render();
  }
  function redo() {
    if (!future.length) return;
    past.push(snapshot());
    notes = future.pop();
    store.save(notes); updateHistBtns(); render();
  }

  // more primary colours
  const COLORS = [
    { k: "default", bg: "#ffffff" },
    { k: "red",     bg: "#ff6b5e" },
    { k: "orange",  bg: "#ff9f43" },
    { k: "yellow",  bg: "#ffd633" },
    { k: "green",   bg: "#4ad66d" },
    { k: "teal",    bg: "#2bd1c4" },
    { k: "blue",    bg: "#4d96ff" },
    { k: "purple",  bg: "#9b6bff" },
    { k: "pink",    bg: "#ff6bcb" },
    { k: "gray",    bg: "#c4ccd4" },
  ];
  function colorBg(k) { const c = COLORS.find(x => x.k === k); return c ? c.bg : "#ffffff"; }

  function id() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  // data model: note.rows = [{l, r}, ...]
  function migrate(list) {
    const out = list.map(n => {
      let rows = n.rows;
      if (!rows) {
        rows = [];
        (n.body || "").split("\n").forEach(line => {
          let l = line, r = "";
          if (line.includes("\t")) { const p = line.split("\t"); l = p[0]; r = p.slice(1).join(" "); }
          else if (line.includes(" -- ")) { const p = line.split(" -- "); l = p[0]; r = p.slice(1).join(" "); }
          rows.push({ l, r });
        });
        if (!rows.length) rows.push({ l: "", r: "" });
      }
      return { id: n.id, title: n.title || "", color: n.color || "default", rows,
               col: (typeof n.col === "number" ? n.col : null),
               ord: (typeof n.ord === "number" ? n.ord : null),
               userHeight: (typeof n.userHeight === "number" ? n.userHeight : null),
               t: n.t || Date.now() };
    });
    // assign col/ord for any note missing them: distribute in current order across 2 cols
    let needAssign = out.some(n => n.col === null);
    if (needAssign) {
      const counts = [0, 0];
      out.forEach((n, i) => {
        if (n.col === null) { const c = i % 2; n.col = c; n.ord = counts[c]++; }
      });
    }
    return out;
  }

  const seed = [
    { id: id(), title: "Salutations", color: "default", col: 0, ord: 0, rows: [
      { l: "привет", r: "salut" },
      { l: "здравствуйте", r: "bonjour (poli)" },
      { l: "пока", r: "à bientôt" },
      { l: "спасибо", r: "merci" },
    ], t: Date.now() },
    { id: id(), title: "Vocabulaire russe", color: "yellow", col: 1, ord: 0, rows: [
      { l: "быть (inf)", r: "être", head: true },
      { l: "книга", r: "livre" },
      { l: "завтра", r: "demain" },
      { l: "всегда", r: "toujours" },
    ], t: Date.now()-1 },
    { id: id(), title: "À faire", color: "blue", col: 1, ord: 1, rows: [
      { l: "réviser", r: "les verbes" },
      { l: "synchro Drive", r: "plus tard" },
    ], t: Date.now()-2 },
  ];

  let notes = store.load() ? migrate(store.load()) : seed;

  // ---- one-time vocabulary import (replaces everything, runs once) ----
  const VOCA_FLAG = "numagalipov.vocaImported.v1";
  function finalizeVoca() {
    return VOCA_SEED.map((n, i) => ({
      id: id(),
      title: n.title,
      color: n.color || "default",
      col: (typeof n.col === "number" ? n.col : (i % 2)),
      ord: (typeof n.ord === "number" ? n.ord : 0),
      userHeight: null,
      rows: (n.rows && n.rows.length) ? n.rows.map(r => ({ l: r.l || "", r: r.r || "", head: !!r.head, mark: r.mark === 2 ? 2 : 0 })) : [{ l: "", r: "" }],
      t: Date.now() + i
    }));
  }
  try {
    if (!localStorage.getItem(VOCA_FLAG) && typeof VOCA_SEED !== "undefined") {
      notes = finalizeVoca();
      localStorage.setItem(VOCA_FLAG, "1");
    }
  } catch (e) {}

  store.save(notes);

  const $ = s => document.querySelector(s);
  const columns = $("#columns");
  const search = $("#search");
  const clearBtn = $("#clear");
  const nav = $("#nav");
  const tally = $("#tally");
  const sheet = $("#sheet");
  const back = $("#back");
  const eTitle = $("#e-title");
  const erows = $("#erows");
  const swatches = $("#swatches");
  const menu = $("#menu");

  let query = "";
  let hits = [];
  let hitIndex = -1;
  let editingId = null;
  let editColor = "default";
  let draft = [];   // working rows in the editor

  function esc(s) { return (s||"").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
  function reEsc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
  function mark(text) {
    const safe = esc(text);
    if (!query) return safe;
    return safe.replace(new RegExp("(" + reEsc(query) + ")", "gi"), "<mark>$1</mark>");
  }
  function noteText(n) { return n.title + "\n" + n.rows.map(r => r.l + " " + r.r).join("\n"); }
  function matches(n) { return !query || noteText(n).toLowerCase().includes(query.toLowerCase()); }

  // ---- pointer-based long-press drag to reorder notes ----
  let dragState = null;
  function attachDrag(card, noteId) {
    const handle = card.querySelector(".draghandle");
    let startX, startY, dragging = false, ghost = null;
    let dragArmed = false, armTimer = null;

    // tap counting on the handle: 2 taps arm drag, 3 taps -> resize
    let tapCount = 0, tapTimer = null;
    handle.addEventListener("click", (e) => {
      e.stopPropagation();
      tapCount++;
      clearTimeout(tapTimer);
      if (tapCount === 2) {
        // arm drag: a subsequent press+move on the handle will drag
        dragArmed = true;
        handle.classList.add("armed");
        clearTimeout(armTimer);
        armTimer = setTimeout(() => { dragArmed = false; handle.classList.remove("armed"); }, 1500);
      }
      if (tapCount >= 3) {
        tapCount = 0;
        dragArmed = false; handle.classList.remove("armed"); clearTimeout(armTimer);
        enterResizeMode(card, noteId);
        return;
      }
      tapTimer = setTimeout(() => { tapCount = 0; }, 450);
    });

    function pointerDown(e) {
      if (e.button === 1 || e.button === 2) return;
      const pt = e.touches ? e.touches[0] : e;
      startX = pt.clientX; startY = pt.clientY;
      const onHandle = !!e.target.closest(".draghandle");
      // only the handle, and only once drag has been armed by a double-click, can start a drag
      if (onHandle && dragArmed) {
        document.addEventListener("pointermove", checkMove);
        document.addEventListener("pointerup", pointerUp, { once: true });
        return;
      }
      // body press or un-armed handle press: do nothing special (no long-press drag)
    }
    function checkMove(e) {
      if (dragging) { onDrag(e); return; }
      const movedFar = Math.abs(e.clientX - startX) > 6 || Math.abs(e.clientY - startY) > 6;
      if (movedFar && dragArmed) { beginDrag(e); }
    }
    function beginDrag(pt) {
      dragging = true;
      dragArmed = false; handle.classList.remove("armed"); clearTimeout(armTimer);
      card.dataset.suppressClick = "1";
      card.classList.add("dragging");
      if (navigator.vibrate) navigator.vibrate(8);
      ghost = card.cloneNode(true);
      ghost.classList.add("drag-ghost");
      ghost.style.position = "fixed";
      ghost.style.pointerEvents = "none";
      ghost.style.width = card.offsetWidth + "px";
      ghost.style.left = card.getBoundingClientRect().left + "px";
      ghost.style.top = card.getBoundingClientRect().top + "px";
      ghost.style.zIndex = 999;
      ghost.style.opacity = ".95";
      ghost.style.transform = "scale(1.03)";
      ghost.style.boxShadow = "0 12px 30px rgba(0,0,0,.25)";
      ghost.classList.remove("dragging");
      document.body.appendChild(ghost);
      dragState = { id: noteId, offY: pt.clientY - card.getBoundingClientRect().top, offX: pt.clientX - card.getBoundingClientRect().left };
    }
    function onDrag(e) {
      if (!ghost) return;
      ghost.style.left = (e.clientX - dragState.offX) + "px";
      ghost.style.top = (e.clientY - dragState.offY) + "px";
      ghost.style.display = "none";
      const el = document.elementFromPoint(e.clientX, e.clientY);
      ghost.style.display = "";
      document.querySelectorAll(".card.dragover-top, .card.dragover-bot").forEach(c => c.classList.remove("dragover-top","dragover-bot"));
      document.querySelectorAll(".col.coltarget").forEach(c => c.classList.remove("coltarget"));
      const over = el && el.closest(".card");
      if (over && over !== card) {
        const rect = over.getBoundingClientRect();
        over.classList.add(e.clientY > rect.top + rect.height/2 ? "dragover-bot" : "dragover-top");
      } else {
        const col = el && el.closest(".col");
        if (col) col.classList.add("coltarget");
      }
    }
    function pointerUp(e) {
      document.removeEventListener("pointermove", checkMove);
      if (!dragging) { return; }
      dragging = false;
      ghost && ghost.style && (ghost.style.display = "none");
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const over = el && el.closest(".card");
      const col = el && el.closest(".col");
      if (ghost) { ghost.remove(); ghost = null; }
      document.querySelectorAll(".drag-ghost").forEach(g => g.remove());
      card.classList.remove("dragging");
      document.querySelectorAll(".card.dragover-top, .card.dragover-bot").forEach(c => c.classList.remove("dragover-top","dragover-bot"));
      document.querySelectorAll(".col.coltarget").forEach(c => c.classList.remove("coltarget"));
      if (over && over.dataset.id && over.dataset.id !== noteId) {
        dropOnCard(noteId, over.dataset.id, e.clientY);
      } else if (col && col.dataset.col != null) {
        dropInColumn(noteId, parseInt(col.dataset.col, 10));
      }
      setTimeout(() => { delete card.dataset.suppressClick; }, 50);
    }
    handle.addEventListener("pointerdown", pointerDown);
    card.addEventListener("pointerdown", pointerDown);
  }

  // drop onto a target card (above/below) OR onto an empty column drop-zone
  function dropOnCard(fromId, toId, clientY) {
    const moved = notes.find(n => n.id === fromId);
    const target = notes.find(n => n.id === toId);
    if (!moved || !target || fromId === toId) return false;
    pushHistory();
    const destCol = target.col;
    const rect = columns.querySelector(`.card[data-id="${toId}"]`)?.getBoundingClientRect();
    const after = rect ? (clientY > rect.top + rect.height / 2) : false;
    moveInto(moved, destCol, target.ord + (after ? 1 : 0));
    commitOrder();
    return true;
  }
  function dropInColumn(fromId, destCol) {
    const moved = notes.find(n => n.id === fromId);
    if (!moved) return false;
    pushHistory();
    const count = notes.filter(n => n.col === destCol && n.id !== fromId).length;
    moveInto(moved, destCol, count); // append at end
    commitOrder();
    return true;
  }
  function moveInto(moved, destCol, destIndex) {
    // pull moved out of its column ordering, then insert at destIndex in destCol
    const fromCol = moved.col;
    // shift down items in source col after moved (handled by normalize later)
    moved.col = destCol;
    // make room: bump ord of items at/after destIndex in destCol
    notes.filter(n => n.col === destCol && n !== moved && n.ord >= destIndex)
         .forEach(n => n.ord += 1);
    moved.ord = destIndex;
  }
  function commitOrder() { normalizeOrder(); store.save(notes); render(); }

  // shrink a single-line element's font-size until its content fits its width (no wrap)
  function fitText(el, maxPx, minPx) {
    if (!el) return;
    el.style.fontSize = maxPx + "px";
    if (el.scrollWidth <= el.clientWidth + 1) return; // already fits
    // compute the ratio needed and apply directly, clamped to minPx
    const ratio = el.clientWidth / el.scrollWidth;
    let size = Math.max(minPx, Math.floor(maxPx * ratio * 100) / 100);
    el.style.fontSize = size + "px";
    // fine-tune a couple of steps in case of rounding
    let guard = 0;
    while (el.scrollWidth > el.clientWidth + 1 && size > minPx && guard < 12) {
      size = Math.max(minPx, size - 0.5); guard++;
      el.style.fontSize = size + "px";
    }
  }
  function fitCellsIn(root, maxPx, minPx) {
    root.querySelectorAll(".cell").forEach(c => {
      if (c.textContent.trim()) fitText(c, maxPx, minPx);
    });
  }

  // resize mode: drag the bottom of the card to set a fixed height, OK to confirm
  function enterResizeMode(card, noteId) {
    const note = notes.find(n => n.id === noteId);
    if (!note) return;
    const grid = card.querySelector(".grid");
    if (!grid) return;
    card.classList.add("resizing");
    grid.style.overflow = "hidden";
    // start from current rendered height
    let h = note.userHeight || Math.min(210, grid.scrollHeight);
    grid.style.maxHeight = h + "px";

    // bottom drag bar
    const bar = document.createElement("div");
    bar.className = "resizebar";
    bar.innerHTML = `<span class="resizegrip">⇕ étirer</span><button class="resizeok">OK</button>`;
    card.appendChild(bar);

    const grip = bar.querySelector(".resizegrip");
    const okBtn = bar.querySelector(".resizeok");

    let dragging = false, startY = 0, startH = 0;
    function down(e) {
      dragging = true;
      const pt = e.touches ? e.touches[0] : e;
      startY = pt.clientY; startH = h;
      e.preventDefault(); e.stopPropagation();
      document.addEventListener("pointermove", move);
      document.addEventListener("pointerup", up, { once: true });
    }
    function move(e) {
      if (!dragging) return;
      const pt = e.touches ? e.touches[0] : e;
      h = Math.max(40, Math.min(1200, startH + (pt.clientY - startY)));
      grid.style.maxHeight = h + "px";
    }
    function up() { dragging = false; document.removeEventListener("pointermove", move); }
    grip.addEventListener("pointerdown", down);

    function finish(e) {
      if (e) e.stopPropagation();
      note.userHeight = Math.round(h);
      store.save(notes);
      card.classList.remove("resizing");
      bar.remove();
      render();
    }
    okBtn.addEventListener("click", finish);
  }

  function buildCard(note) {
    const card = document.createElement("article");
    card.className = "card";
    card.style.background = colorBg(note.color);
    if (note.color !== "default") { card.style.borderColor = "transparent"; card.classList.add("coloured"); }
    if (query) { if (matches(note)) card.classList.add("match"); else card.classList.add("dim"); }
    card.dataset.id = note.id;

    let html = `<span class="draghandle" aria-label="Déplacer">⠿</span>`;
    if (note.title) html += `<h3 class="card-title">${mark(note.title)}</h3>`;
    // always clamp height so a search match deep in the list doesn't expand the card
    const matchRows = [];
    html += `<div class="card-body clamp"><div class="grid">`;
    note.rows.forEach((r, ri) => {
      if (r.l === "" && r.r === "" && !r.head) {
        html += `<div class="row spacer"></div>`;
        return;
      }
      const isMatchRow = query && (r.l + " " + r.r).toLowerCase().includes(query.toLowerCase());
      if (isMatchRow) matchRows.push(ri);
      const cls = "row" + (r.head ? " head" : "") + (r.mark === 2 ? " endmark" : "");
      html += `<div class="${cls}"><div class="cell l">${mark(r.l)}</div><div class="cell r">${mark(r.r)}</div></div>`;
    });
    html += `</div></div>`;
    // position-indicator rail: shows roughly where in the note the matches are
    if (query && matchRows.length && note.rows.length > 1) {
      let dots = "";
      const total = note.rows.length - 1;
      matchRows.forEach(ri => {
        const pct = Math.round((ri / total) * 100);
        dots += `<span class="hitdot" style="top:${pct}%"></span>`;
      });
      html += `<div class="hitrail" title="${matchRows.length} occurrence(s)">${dots}</div>`;
    }
    card.innerHTML = html;
    // set the fade colour to match the card, and flag if content is actually clipped
    card.style.setProperty("--card-bg", colorBg(note.color));
    // apply a per-note custom height if the user set one
    if (note.userHeight) {
      const grid = card.querySelector(".grid");
      if (grid) grid.style.maxHeight = note.userHeight + "px";
    }
    requestAnimationFrame(() => {
      const body = card.querySelector(".card-body");
      const grid = card.querySelector(".grid");
      if (body && grid && grid.scrollHeight > grid.clientHeight + 2) body.classList.add("clipped");
    });
    card.addEventListener("click", e => { if (!card.dataset.suppressClick && !card.classList.contains("resizing")) openEditor(note.id); });
    attachDrag(card, note.id);
    return card;
  }

  const NCOLS = 2;

  function normalizeOrder() {
    // ensure each column has clean 0..k-1 ord values, in current ord order
    for (let c = 0; c < NCOLS; c++) {
      const inCol = notes.filter(n => n.col === c).sort((a,b) => a.ord - b.ord);
      inCol.forEach((n, i) => n.ord = i);
    }
  }

  function render() {
    document.querySelectorAll(".drag-ghost").forEach(g => g.remove());
    if (typeof renderBrand === "function" && brandShowsCount) renderBrand();
    columns.innerHTML = "";
    normalizeOrder();
    const cols = [];
    for (let i = 0; i < NCOLS; i++) { const c = document.createElement("div"); c.className = "col"; c.dataset.col = i; columns.appendChild(c); cols.push(c); }
    let anyMatch = false;
    for (let c = 0; c < NCOLS; c++) {
      const inCol = notes.filter(n => n.col === c).sort((a,b) => a.ord - b.ord);
      inCol.forEach(note => {
        if (query && matches(note)) anyMatch = true;
        cols[c].appendChild(buildCard(note));
      });
      // trailing drop zone so you can drop at the very bottom of a column
      const drop = document.createElement("div");
      drop.className = "coldrop"; drop.dataset.col = c;
      cols[c].appendChild(drop);
    }

    if (query && !anyMatch) {
      const e = document.createElement("div");
      e.className = "empty";
      e.innerHTML = `<b>Aucun résultat</b>Aucune note ne contient « ${esc(query)} ».`;
      e.style.flex = "1";
      columns.appendChild(e);
    }
    rebuildHits();
    // auto-shrink overflowing cells on cards (must be in DOM to measure)
    requestAnimationFrame(() => fitCellsIn(columns, 13.5, 4));
  }

  function rebuildHits() {
    hits = Array.from(columns.querySelectorAll("mark"));
    if (hits.length) { hitIndex = Math.min(hitIndex < 0 ? 0 : hitIndex, hits.length - 1); setCurrent(hitIndex, false); nav.hidden = false; }
    else { hitIndex = -1; nav.hidden = !query; }
    updateTally();
  }
  function updateTally() { tally.textContent = (hits.length ? hitIndex + 1 : 0) + "/" + hits.length; }
  function setCurrent(i, scroll) {
    if (!hits.length) return;
    hits.forEach(m => m.classList.remove("current"));
    hitIndex = (i + hits.length) % hits.length;
    const m = hits[hitIndex];
    m.classList.add("current");
    updateTally();
    if (scroll) m.scrollIntoView({ behavior: "smooth", block: "center" });
    highlightActiveDot(m);
  }
  // mark the rail dot corresponding to the current match's row
  function highlightActiveDot(markEl) {
    document.querySelectorAll(".hitdot.current").forEach(d => d.classList.remove("current"));
    const card = markEl.closest(".card");
    if (!card) return;
    const row = markEl.closest(".row");
    if (!row) return;
    // index of this row among rendered rows
    const rows = Array.from(card.querySelectorAll(".grid > .row"));
    const ri = rows.indexOf(row);
    const matchRowEls = rows.map((r, i) => ({ r, i })).filter(o => o.r.querySelector("mark"));
    // find dot order: dots are created per matching row in document order
    const dotIdx = matchRowEls.findIndex(o => o.r === row);
    const dots = card.querySelectorAll(".hitdot");
    if (dotIdx >= 0 && dots[dotIdx]) dots[dotIdx].classList.add("current");
  }
  function step(dir) {
    if (editorOpen()) {
      collectEditorMatches();
      updateEdNav();
      if (editorMatches.length) gotoEditorMatch((editorMatchIdx < 0 ? 0 : editorMatchIdx) + dir, true);
      return;
    }
    if (hits.length) setCurrent(hitIndex + dir, true);
  }

  let debounce;
  search.addEventListener("input", () => {
    clearBtn.hidden = !search.value;
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      query = search.value.trim(); hitIndex = 0;
      if (editorOpen()) { editorMatchIdx = -1; updateEdNav(); if (editorMatches.length) gotoEditorMatch(0, true); }
      else { render(); if (hits.length) setCurrent(0, true); }
    }, 120);
  });
  search.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); step(e.shiftKey ? -1 : 1); } });
  clearBtn.addEventListener("click", () => { search.value = ""; query = ""; clearBtn.hidden = true; updateEdNav(); render(); search.focus(); });
  $("#next").addEventListener("click", () => step(1));
  $("#prev").addEventListener("click", () => step(-1));
  const _ednext = $("#ednext"); if (_ednext) _ednext.addEventListener("click", () => step(1));
  const _edprev = $("#edprev"); if (_edprev) _edprev.addEventListener("click", () => step(-1));

  // ---- colours in popover ----
  COLORS.forEach(c => {
    const s = document.createElement("div");
    s.className = "swatch"; s.style.background = c.bg; s.dataset.k = c.k;
    if (c.k === "default") s.style.borderColor = "var(--line)";
    s.addEventListener("click", () => { editColor = c.k; paintSwatches(); applyEditorColor(); });
    swatches.appendChild(s);
  });
  function paintSwatches() { swatches.querySelectorAll(".swatch").forEach(s => s.classList.toggle("sel", s.dataset.k === editColor)); }
  function applyEditorColor() {
    const bg = colorBg(editColor);
    sheet.style.background = bg;
    const t = document.getElementById("e-title");
    if (t) t.style.background = "transparent";
    const head = document.querySelector(".sheet-head");

    note.rows.forEach(r => { if ((r.l && r.l.trim()) || (r.r && r.r.trim())) n++; });
    return n;
  }
  function countAllWords() {
    return notes.reduce((sum, n) => sum + countNoteWords(n), 0);
  }
  // tap the title to toggle between the app name and the total word count
  let brandShowsCount = false;
  const brandEl = document.getElementById("brand");
  function renderBrand() {
    if (!brandEl) return;
    if (brandShowsCount) {
      const c = countAllWords();
      brandEl.textContent = c + (c > 1 ? " mots" : " mot");
      brandEl.classList.add("counting");
    } else {
      brandEl.innerHTML = 'Нюма <span>Галипов</span>';
      brandEl.classList.remove("counting");
    }
  }
  if (brandEl) brandEl.addEventListener("click", () => { brandShowsCount = !brandShowsCount; renderBrand(); syncHeaderHeight(); });
  cloud.start();
  // show stored version + last-save time on launch
  try { setSavedAt(parseInt(localStorage.getItem(SAVED_KEY) || "0", 10) || Date.now()); } catch (e) { setSavedAt(Date.now()); }
  setInterval(() => cloud.pullNow(), 30000);
  document.addEventListener("visibilitychange", () => { if (!document.hidden) cloud.pullNow(); });

  render();
  requestAnimationFrame(syncHeaderHeight);
})();
</script>
</body>
</html>
